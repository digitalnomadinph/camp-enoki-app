<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Camp Enoki</title>

  <!-- PWA: makes the page installable as an app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2f5d3a" />

  <!-- iOS "Add to Home Screen" standalone support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Camp Enoki" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />

  <style>
    html, body { margin: 0; height: 100%; background: #2f5d3a; overflow: hidden; }
    #app { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
    #splash {
      position: fixed; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center;
      background: #2f5d3a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
      transition: opacity .4s ease; flex-direction: column; gap: 14px;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .t { font-size: 22px; font-weight: 700; letter-spacing: .5px; }
    #splash .s { font-size: 13px; opacity: .8; }
    .spin { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: r .8s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="t">Camp Enoki</div>
    <div class="spin"></div>
    <div class="s">Loading your booking portal...</div>
  </div>

  <!-- The live booking portal (Google Apps Script web app) runs inside here.
       If you ever redeploy a brand-new deployment, replace this src with the
       new /exec URL. (A "New version" of the SAME deployment keeps this URL.) -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbz_TVOkKClvIgoLmRScufHqAuKs2CXU2XI9yVj_puwy3VtQNup3_qsQl6-J6PYV0FnqDg/exec"
    allow="clipboard-write; geolocation"
    onload="document.getElementById('splash').classList.add('hide')"></iframe>

  <script>
    // Register the service worker so the browser offers "Install app".
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function (e) {
          console.log('Service worker registration failed:', e);
        });
      });
    }
    // Safety net: hide the splash after 8s even if onload never fires.
    setTimeout(function () { document.getElementById('splash').classList.add('hide'); }, 8000);
  </script>
</body>
</html>
