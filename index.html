<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Camp Enoki</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2f5d3a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Camp Enoki" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />

  <style>
    html, body { margin: 0; height: 100%; background: #2f5d3a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
    .wrap { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 12px; }
    .logo { width: 132px; height: 132px; border-radius: 26px; box-shadow: 0 6px 20px rgba(0,0,0,.3); }
    h1 { margin: 8px 0 0; font-size: 26px; }
    .sub { margin: 0; opacity: .85; font-size: 14px; }
    .btn { margin-top: 12px; background: #fff; color: #2f5d3a; font-weight: 700; font-size: 16px; text-decoration: none; padding: 14px 28px; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,.22); }
    .hint { font-size: 12.5px; opacity: .82; margin-top: 8px; max-width: 320px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="icon-512.png" alt="Camp Enoki" />
    <h1>Camp Enoki</h1>
    <p class="sub">Booking Portal</p>
    <a id="go" class="btn"
       href="https://script.google.com/macros/s/AKfycby1EMAUgPxTYs2ymbwH8c_D5YLr3XIgUlUGu9dY4zB7_M9pXnVFb2P0RmyaolBBk2D1Ow/exec">
       Open Booking Portal
    </a>
    <p id="hint" class="hint"></p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function () {});
      });
    }
    var url = document.getElementById('go').href;
    var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (standalone) {
      // Launched from the installed home-screen app: go straight to the portal.
      document.getElementById('hint').textContent = 'Opening your booking portal...';
      setTimeout(function () { window.location.href = url; }, 600);
    } else {
      // Normal browser tab: STAY here (this page is installable) so Chrome can
      // offer "Install app". Tapping the button opens the portal.
      document.getElementById('hint').innerHTML = 'Tap <b>Open Booking Portal</b> to book &middot; or browser menu (&#8942;) &rarr; <b>Install app</b> to add it to your home screen.';
    }
  </script>
</body>
</html>
