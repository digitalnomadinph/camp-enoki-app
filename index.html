<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Camp Enoki</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2f5d3a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Camp Enoki" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />

  <style>
    html, body { margin: 0; height: 100%; background: #2f5d3a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
    .wrap { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 12px; }
    .logo { width: 116px; height: 116px; border-radius: 26px; box-shadow: 0 6px 20px rgba(0,0,0,.28); }
    h1 { margin: 8px 0 0; font-size: 26px; }
    p { margin: 0; opacity: .85; font-size: 14px; }
    .btn { margin-top: 10px; background: #fff; color: #2f5d3a; font-weight: 700; font-size: 16px; text-decoration: none; padding: 14px 28px; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,.2); }
    .hint { font-size: 12px; opacity: .7; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="icon-512.png" alt="Camp Enoki" />
    <h1>Camp Enoki</h1>
    <p>Booking Portal</p>
    <a id="go" class="btn"
       href="https://script.google.com/macros/s/AKfycbz_TVOkKClvIgoLmRScufHqAuKs2CXU2XI9yVj_puwy3VtQNup3_qsQl6-J6PYV0FnqDg/exec">
       Open Booking Portal
    </a>
    <p class="hint">Opening your booking portal...</p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function () {});
      });
    }
    // Open the portal at the TOP level. Chrome blocks Google Apps Script inside an
    // embedded frame (third-party), but opening it directly works everywhere.
    var url = document.getElementById('go').href;
    setTimeout(function () { window.location.href = url; }, 1100);
  </script>
</body>
</html>
